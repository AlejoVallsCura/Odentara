<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odentara</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 text-gray-800 font-inter">

        <div id="login-view" class="view-section active">
        <div class="login-container">
            <div class="login-card">
                <div class="login-theme-toggle-wrap">
                    <button type="button" class="theme-toggle-btn" data-theme-toggle aria-label="Cambiar tema" title="Cambiar tema">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <div class="logo-container">
                    <img src="favicon.svg" alt="Odentara" class="brand-logo-img logo-icon">
                    <h2>Odentara.app</h2>
                </div>
                <p class="login-subtitle">Ingresa a tu cuenta</p>
                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="tu@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="cualquier contraseña">
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Ingresar</button>
                </form>
            </div>
            <div class="login-decoration">
                <div class="blob shape-1"></div>
                <div class="blob shape-2"></div>
            </div>
        </div>
    </div>

    <div id="app-view" class="view-section hidden flex h-screen overflow-hidden">
        <div id="sidebar-backdrop" class="sidebar-backdrop hidden"></div>
        <aside id="app-sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col transition-all duration-300">
            <div class="app-brand p-6 border-b border-gray-100 flex items-center gap-3">
                <div class="app-brand-mark w-8 h-8 rounded bg-primary-600 text-white flex items-center justify-center">
                    <img src="favicon.svg" alt="Odentara" class="brand-logo-img">
                </div>
                <div>
                    <h1 class="font-bold text-lg text-gray-800 tracking-tight">Odentara</h1>
                    <p class="app-brand-subtitle">Centro odontológico</p>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto py-4" id="sidebar-nav">
            </nav>

            <div class="sidebar-user-wrap p-4 border-t border-gray-200">
                <div class="flex items-center gap-3 user-profile cursor-pointer p-2 rounded-xl hover:bg-gray-50 transition-colors">
                    <div class="w-10 h-10 rounded-full bg-primary-100 text-primary-700 flex items-center justify-center font-bold" id="user-initials">
                        AD
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-gray-900 truncate" id="user-name">Dr. Admin</p>
                        <p class="text-xs text-gray-500 truncate" id="user-role-display">Superadmin</p>
                    </div>
                    <button id="logout-btn" class="sidebar-logout-btn text-gray-400 hover:text-red-500 transition-colors" title="Cerrar sesión">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-gray-50/50 overflow-hidden relative">
            <header class="app-header h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-10">
                <h2 id="page-title" class="sr-only">Dashboard</h2>
                <div class="mobile-header-left">
                    <button id="sidebar-toggle" class="sidebar-toggle-btn" type="button" aria-label="Abrir menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="mobile-header-brand">
                        <div class="mobile-header-brand-mark">
                            <img src="favicon.svg" alt="Odentara" class="brand-logo-img">
                        </div>
                        <span>Odentara</span>
                    </div>
                </div>
                <div class="header-actions flex items-center"></div>
            </header>

            <div id="main-content" class="flex-1 overflow-y-auto p-6 scroll-smooth">
            </div>
        </main>
    </div>

    <div id="modals-container"></div>

    <script src="app.js"></script>
</body>

</html>
